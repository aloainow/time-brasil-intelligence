<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Brasil Intelligence — COB Analytics Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #060b14; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const App = () => {
  const [sec, setSec] = useState("overview");
  const [loaded, setLoaded] = useState(false);
  const [hov, setHov] = useState(null);
  const [selConf, setSelConf] = useState(null);
  const [cTab, setCTab] = useState("radar");
  useEffect(() => { setTimeout(() => setLoaded(true), 100); }, []);
  const fn = "'Outfit','Segoe UI',sans-serif", mn = "'DM Mono',monospace";
  const cd = { background: "linear-gradient(135deg,#0d1b2a,#152238)", borderRadius: 16, padding: 24, border: "1px solid #1e3a5f30" };
  const ic = { background: "#0a1628", borderRadius: 12, padding: 16, border: "1px solid #1e3a5f20" };
  const secs = [{id:"overview",l:"Visão Geral",i:"◉"},{id:"athletes",l:"Atletas 360",i:"⬡"},{id:"confederations",l:"Confederações",i:"◈"},{id:"competition",l:"Competição",i:"◇"},{id:"health",l:"Saúde & Carga",i:"♡"},{id:"strategy",l:"Estratégico",i:"◆"},{id:"public",l:"Portal Público",i:"◎"}];
  const aths = [
    {n:"Rebeca Andrade",s:"Ginástica",st:"green",r:1,p:97,ph:"RA",t:"ind"},
    {n:"Rayssa Leal",s:"Skate",st:"green",r:1,p:96,ph:"RL",t:"ind"},
    {n:"Caio Bonfim",s:"Marcha",st:"green",r:1,p:95,ph:"CB",t:"ind"},
    {n:"Gabriel Medina",s:"Surf",st:"green",r:2,p:90,ph:"GM",t:"ind"},
    {n:"Bia Souza",s:"Judô +78kg",st:"yellow",r:3,p:88,ph:"BS",t:"ind"},
    {n:"Isaquias Queiroz",s:"Canoagem",st:"green",r:4,p:85,ph:"IQ",t:"ind"},
  ];
  const confs = [
    {id:"cbb",nm:"CBB",sp:"Basquete",st:"active",tp:"col",at:24,mods:["radar","report","chemistry","health"],cl:"#F97316"},
    {id:"cbv",nm:"CBV",sp:"Vôlei",st:"active",tp:"col",at:28,mods:["radar","report","chemistry","health"],cl:"#3B82F6"},
    {id:"cbj",nm:"CBJ",sp:"Judô",st:"active",tp:"ind",at:28,mods:["radar","report","context","health"],cl:"#EF4444"},
    {id:"cbat",nm:"CBAt",sp:"Atletismo",st:"active",tp:"ind",at:62,mods:["radar","report","context","health"],cl:"#FFB020"},
    {id:"cbg",nm:"CBG",sp:"Ginástica",st:"active",tp:"ind",at:14,mods:["radar","report","context","health"],cl:"#EC4899"},
    {id:"cbsurf",nm:"CBSurf",sp:"Surf",st:"pending",tp:"ind",at:8,mods:["radar","health"],cl:"#10B981"},
    {id:"cbsk",nm:"CBSk",sp:"Skate",st:"active",tp:"ind",at:10,mods:["radar","report","context","health"],cl:"#F43F5E"},
    {id:"cbhb",nm:"CBHB",sp:"Handebol",st:"pending",tp:"col",at:22,mods:["radar","health"],cl:"#8B5CF6"},
    {id:"cbda",nm:"CBDA",sp:"Natação",st:"active",tp:"ind",at:35,mods:["radar","report","context","health"],cl:"#06B6D4"},
    {id:"cbvela",nm:"CBVela",sp:"Vela",st:"pending",tp:"ind",at:18,mods:["radar"],cl:"#6366F1"},
    {id:"cbc",nm:"CBC",sp:"Canoagem",st:"pending",tp:"ind",at:16,mods:["radar"],cl:"#F59E0B"},
    {id:"cbboxe",nm:"CBBoxe",sp:"Boxe",st:"inactive",tp:"ind",at:12,mods:[],cl:"#EF4444"},
  ];
  const Dot = ({s}) => <span style={{width:10,height:10,borderRadius:"50%",display:"inline-block",background:s==="green"?"#22C55E":s==="yellow"?"#FBBF24":"#EF4444",boxShadow:`0 0 8px ${s==="green"?"#22C55E":s==="yellow"?"#FBBF24":"#EF4444"}60`}}/>;
  const Bar = ({v,c="#009C3B",w=120}) => <div style={{width:w,height:6,background:"#1a2332",borderRadius:3,overflow:"hidden"}}><div style={{width:`${v}%`,height:"100%",background:`linear-gradient(90deg,${c},${c}CC)`,borderRadius:3,transition:"width 1s ease"}}/></div>;
  const Ring = ({v,sz=48,c="#009C3B"}) => {const r=(sz-6)/2,ci=2*Math.PI*r,o=ci-(v/100)*ci;return <svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#1a2332" strokeWidth={4}/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={c} strokeWidth={4} strokeDasharray={ci} strokeDashoffset={o} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.2s ease"}}/><text x={sz/2} y={sz/2} textAnchor="middle" dominantBaseline="central" style={{transform:"rotate(90deg)",transformOrigin:"center",fontSize:sz*.28,fill:"#fff",fontWeight:700}}>{v}</text></svg>};
  const Badge = ({n,a}) => <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,fontWeight:600,background:a?"#009C3B20":"#1e3a5f20",color:a?"#009C3B":"#445566",textTransform:"uppercase"}}>{n}</span>;
  const renderOverview = () => (
    <div style={{display:"flex",flexDirection:"column",gap:24}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
        {[{l:"Atletas Monitorados",v:"583",s:"47 modalidades",a:"#009C3B"},{l:"Confederações Integradas",v:"9/33",s:"7 ativas, 2 onboarding",a:"#3B82F6"},{l:"Vagas LA 2028",v:"127",s:"de 240 possíveis",a:"#FFDF00"},{l:"Projeção Medalhas",v:"22",s:"8🥇 7🥈 7🥉",a:"#EC4899"}].map((k,i)=>(
          <div key={i} style={{...cd,position:"relative",overflow:"hidden",cursor:"pointer",transform:loaded?"translateY(0)":"translateY(20px)",opacity:loaded?1:0,transition:`all .6s ease ${i*.1}s`}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${k.a},transparent)`,borderRadius:"16px 16px 0 0"}}/>
            <div style={{fontSize:11,color:"#8899aa",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8,fontFamily:mn}}>{k.l}</div>
            <div style={{fontSize:32,fontWeight:800,color:"#fff",fontFamily:fn}}>{k.v}</div>
            <div style={{fontSize:13,color:k.a,marginTop:6,fontWeight:500}}>{k.s}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        <div style={cd}>
          <h3 style={{color:"#fff",fontSize:15,fontWeight:700,margin:"0 0 16px",fontFamily:fn}}>Destaques — Atletas Elite</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {aths.map((a,i)=>(
              <div key={i} style={{...ic,cursor:"pointer",transition:"all .3s",borderColor:hov===`a${i}`?"#009C3B40":"#1e3a5f20"}} onMouseEnter={()=>setHov(`a${i}`)} onMouseLeave={()=>setHov(null)}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,#009C3B,#FFDF00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#0d1b2a"}}>{a.ph}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.n}</div>
                    <div style={{fontSize:10,color:"#667788"}}>{a.s}</div>
                  </div>
                  <Dot s={a.st}/>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:8}}>
                  <span style={{fontSize:10,color:"#8899aa"}}>#{a.r}</span>
                  <Bar v={a.p} w={70}/><span style={{fontSize:10,color:"#009C3B",fontWeight:600}}>{a.p}%</span>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={cd}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <h3 style={{color:"#fff",fontSize:15,fontWeight:700,margin:0,fontFamily:fn}}>Arquitetura da Plataforma</h3>
            <span style={{fontSize:10,color:"#009C3B",background:"#009C3B15",padding:"3px 10px",borderRadius:20,fontWeight:600}}>LIVE</span>
          </div>
          <div style={{...ic,textAlign:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#009C3B",marginBottom:4}}>CAMADA 1 — COB</div>
            <div style={{fontSize:10,color:"#8899aa"}}>Dashboard Estratégico • Medal Projection • ROI • Talent Pipeline</div>
          </div>
          <div style={{fontSize:14,textAlign:"center",color:"#009C3B40",margin:"4px 0"}}>▼ ▼ ▼</div>
          <div style={{...ic,textAlign:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#3B82F6",marginBottom:4}}>CAMADA 2 — CONFEDERAÇÕES</div>
            <div style={{fontSize:10,color:"#8899aa"}}>Radar • Report Generator • Chemistry/Context • Health</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
            <div style={{...ic,textAlign:"center",borderColor:"#F9731640"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#F97316"}}>Coletivos</div>
              <div style={{fontSize:9,color:"#667788",marginTop:2}}>Chemistry Analyzer • Lineups • JOI/JDI</div>
            </div>
            <div style={{...ic,textAlign:"center",borderColor:"#EC489940"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#EC4899"}}>Individuais</div>
              <div style={{fontSize:9,color:"#667788",marginTop:2}}>Context Analyzer • Rivalry • Peak Model</div>
            </div>
          </div>
        </div>
      </div>
      <div style={cd}>
        <h3 style={{color:"#fff",fontSize:15,fontWeight:700,margin:"0 0 16px",fontFamily:fn}}>Status de Integração — Confederações</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8}}>
          {confs.map((c,i)=>(
            <div key={i} onClick={()=>{setSelConf(c);setSec("confederations");setCTab("radar");}} style={{...ic,textAlign:"center",cursor:"pointer",opacity:c.st==="inactive"?.4:1,borderColor:c.st==="active"?"#22C55E20":c.st==="pending"?"#FBBF2420":"#1e3a5f15",transition:"all .2s"}}>
              <div style={{width:32,height:32,borderRadius:8,margin:"0 auto 6px",background:`${c.cl}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:c.cl}}>{c.nm.substring(0,3)}</div>
              <div style={{fontSize:11,color:"#ccd6e0",fontWeight:600}}>{c.nm}</div>
              <div style={{fontSize:9,color:"#556677"}}>{c.sp}</div>
              <div style={{fontSize:8,marginTop:4,fontWeight:700,padding:"2px 6px",borderRadius:10,display:"inline-block",color:c.st==="active"?"#22C55E":c.st==="pending"?"#FBBF24":"#556677",background:c.st==="active"?"#22C55E15":c.st==="pending"?"#FBBF2415":"#1e3a5f15"}}>{c.st==="active"?"INTEGRADA":c.st==="pending"?"PENDENTE":"NÃO INICIADA"}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
  const renderConf = () => {
    const cf = selConf || confs[0];
    const isC = cf.tp==="col";
    const tabs = isC?[{id:"radar",l:"Radar"},{id:"report",l:"Report"},{id:"chemistry",l:"Chemistry"},{id:"health",l:"Health"}]:[{id:"radar",l:"Radar"},{id:"report",l:"Report"},{id:"context",l:"Context"},{id:"health",l:"Health"}];
    return (
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {confs.filter(c=>c.st!=="inactive").map(c=>(
            <button key={c.id} onClick={()=>{setSelConf(c);setCTab("radar");}} style={{background:cf.id===c.id?c.cl:"#0d1b2a",border:`1px solid ${cf.id===c.id?c.cl:"#1e3a5f30"}`,borderRadius:10,padding:"8px 14px",color:cf.id===c.id?"#fff":"#8899aa",fontSize:12,fontWeight:600,cursor:"pointer"}}>{c.nm} <span style={{fontSize:9,opacity:.7}}>({c.sp})</span></button>
          ))}
        </div>
        <div style={cd}>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
            <div style={{width:56,height:56,borderRadius:14,background:`${cf.cl}25`,border:`2px solid ${cf.cl}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:cf.cl}}>{cf.nm.substring(0,3)}</div>
            <div>
              <div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:fn}}>{cf.nm} <span style={{color:"#667788",fontWeight:400}}>Analytics</span></div>
              <div style={{fontSize:13,color:"#8899aa"}}>{cf.sp} • {cf.at} atletas • <span style={{color:isC?"#F97316":"#EC4899",fontWeight:600}}>{isC?"Coletivo":"Individual"}</span></div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:6}}>{cf.mods.map(m=><Badge key={m} n={m} a={true}/>)}</div>
          </div>
          <div style={{display:"flex",gap:0,borderBottom:"1px solid #1e3a5f30",marginBottom:20}}>
            {tabs.map(t=>(
              <div key={t.id} onClick={()=>setCTab(t.id)} style={{padding:"10px 20px",fontSize:13,fontWeight:cTab===t.id?700:500,color:cTab===t.id?"#009C3B":"#667788",cursor:"pointer",borderBottom:cTab===t.id?"2px solid #009C3B":"2px solid transparent"}}>{t.l}</div>
            ))}
          </div>
          {cTab==="radar"&&<div>
            <h4 style={{color:"#fff",fontSize:14,fontWeight:700,margin:"0 0 12px"}}>Radar — Brasileiros no Exterior ({cf.sp})</h4>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {(isC?[{n:"Gui Santos",l:"NBA — Warriors",s:"8.2 PPG",t:"+12%"},{n:"Raulzinho",l:"EuroLeague — Baskonia",s:"12.4 PPG",t:"+5%"},{n:"Yago",l:"ACB — Tenerife",s:"14.1 PPG",t:"+8%"}]:[{n:"Atleta 1",l:"Circuito Internacional",s:"Rank #3",t:"+15%"},{n:"Atleta 2",l:"Grand Slam / World Cup",s:"Rank #5",t:"+8%"},{n:"Atleta 3",l:"Grand Prix / Tour",s:"Rank #8",t:"+3%"}]).map((p,i)=>(
                <div key={i} style={ic}>
                  <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{p.n}</div>
                  <div style={{fontSize:11,color:"#667788",margin:"4px 0"}}>{p.l}</div>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:14,fontWeight:700,color:cf.cl}}>{p.s}</span><span style={{fontSize:11,color:"#22C55E"}}>{p.t}</span></div>
                </div>
              ))}
            </div>
          </div>}
          {cTab==="report"&&<div>
            <h4 style={{color:"#fff",fontSize:14,fontWeight:700,margin:"0 0 12px"}}>{isC?"BasketBrain":"SportBrain"} — Report Generator</h4>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={ic}>
                <div style={{fontSize:12,color:"#8899aa",marginBottom:8,fontWeight:600}}>{isC?"Métricas de Jogo":"Métricas de Competição"}</div>
                {(isC?["OFFRTG • DEFRTG • NETRTG","TS% • EFG% • PACE","AST/TO • OREB% • TOV%","PIE • POSS • Shot Charts"]:["Splits por trecho/fase","Opponent Profile detalhado","Consistency Analysis","D-score • E-score • Wave Score"]).map((m,i)=>(<div key={i} style={{fontSize:12,color:"#ccd6e0",padding:"6px 0",borderBottom:i<3?"1px solid #1e3a5f15":"none"}}>{m}</div>))}
              </div>
              <div style={ic}>
                <div style={{fontSize:12,color:"#8899aa",marginBottom:8,fontWeight:600}}>Relatório com IA</div>
                {["Análise SWOT automatizada","Chaves para vitória/derrota",isC?"Scouting de adversários":"Opponent Profile","Recomendações táticas","Exportação em PDF"].map((r,i)=>(<div key={i} style={{fontSize:11,color:"#ccd6e0",display:"flex",alignItems:"center",gap:6}}><span style={{color:"#009C3B"}}>✓</span> {r}</div>))}
              </div>
            </div>
          </div>}
          {cTab==="chemistry"&&isC&&<div>
            <h4 style={{color:"#fff",fontSize:14,fontWeight:700,margin:"0 0 12px"}}>Chemistry Analyzer — Sinergia entre Jogadores</h4>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={ic}>
                <div style={{fontSize:12,color:"#8899aa",marginBottom:10,fontWeight:600}}>Melhores Duplas (JOI/JDI)</div>
                {[{p:"Gui Santos + Raulzinho",j:"+8.4",d:"+5.2"},{p:"Yago + Didi",j:"+6.1",d:"+7.8"},{p:"Felicio + Caboclo",j:"+4.2",d:"+9.1"}].map((x,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<2?"1px solid #1e3a5f15":"none"}}>
                    <span style={{fontSize:12,color:"#ccd6e0"}}>{x.p}</span>
                    <div style={{display:"flex",gap:12}}><span style={{fontSize:11,color:"#22C55E",fontWeight:700}}>JOI {x.j}</span><span style={{fontSize:11,color:"#3B82F6",fontWeight:700}}>JDI {x.d}</span></div>
                  </div>
                ))}
              </div>
              <div style={ic}>
                <div style={{fontSize:12,color:"#8899aa",marginBottom:10,fontWeight:600}}>Melhor Lineup (5-man)</div>
                <div style={{textAlign:"center",padding:10}}>
                  <div style={{fontSize:18,fontWeight:800,color:"#009C3B",fontFamily:fn}}>+12.4 NETRTG</div>
                  <div style={{fontSize:11,color:"#8899aa",margin:"8px 0"}}>Santos • Raulzinho • Yago • Felicio • Caboclo</div>
                  <div style={{fontSize:10,color:"#667788"}}>247 min juntos • 68% win rate</div>
                </div>
              </div>
            </div>
          </div>}
          {cTab==="context"&&!isC&&<div>
            <h4 style={{color:"#fff",fontSize:14,fontWeight:700,margin:"0 0 12px"}}>Context Analyzer — Performance por Condição</h4>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <div style={ic}>
                <div style={{fontSize:12,color:"#8899aa",marginBottom:8,fontWeight:600}}>Context Analyzer</div>
                {[{c:"Golden Score",v:"78% vitória",vs:"vs 62% regular"},{c:"Altitude > 1000m",v:"-2.3% pace",vs:"vs nível do mar"},{c:"Provas matinais",v:"+3.2%",vs:"vs vespertinas"}].map((x,i)=>(
                  <div key={i} style={{padding:"6px 0",borderBottom:i<2?"1px solid #1e3a5f15":"none"}}>
                    <div style={{fontSize:12,color:"#ccd6e0",fontWeight:600}}>{x.c}</div>
                    <div style={{fontSize:11,display:"flex",justifyContent:"space-between"}}><span style={{color:"#22C55E",fontWeight:700}}>{x.v}</span><span style={{color:"#667788"}}>{x.vs}</span></div>
                  </div>
                ))}
              </div>
              <div style={ic}>
                <div style={{fontSize:12,color:"#8899aa",marginBottom:8,fontWeight:600}}>Rivalry Tracker</div>
                {[{r:"vs. R. Dicko (FRA)",rc:"2W-1L",d:"1 ippon, média 3:42"},{r:"vs. I. Ortiz (CUB)",rc:"1W-2L",d:"golden score focus"}].map((x,i)=>(
                  <div key={i} style={{padding:"6px 0",borderBottom:i<1?"1px solid #1e3a5f15":"none"}}>
                    <div style={{fontSize:12,color:"#ccd6e0",fontWeight:600}}>{x.r}</div>
                    <div style={{fontSize:11,display:"flex",justifyContent:"space-between"}}><span style={{color:"#FBBF24",fontWeight:700}}>{x.rc}</span><span style={{color:"#667788"}}>{x.d}</span></div>
                  </div>
                ))}
              </div>
              <div style={ic}>
                <div style={{fontSize:12,color:"#8899aa",marginBottom:8,fontWeight:600}}>Peak Performance</div>
                <div style={{textAlign:"center",padding:"8px 0"}}>
                  <div style={{fontSize:16,fontWeight:800,color:"#EC4899"}}>Jul 2028</div>
                  <div style={{fontSize:10,color:"#667788",margin:"4px 0"}}>Pico projetado</div>
                  <div style={{fontSize:10,color:"#8899aa",marginTop:8}}>Taper: 14 dias</div>
                  <div style={{fontSize:10,color:"#8899aa"}}>Carga: 24h/sem</div>
                  <div style={{fontSize:10,color:"#8899aa"}}>Sono: 8.5h</div>
                </div>
              </div>
            </div>
          </div>}
          {cTab==="health"&&<div>
            <h4 style={{color:"#fff",fontSize:14,fontWeight:700,margin:"0 0 12px"}}>Health — Saúde & Carga</h4>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div style={ic}>
                <div style={{fontSize:12,color:"#8899aa",marginBottom:10,fontWeight:600}}>Semáforo de Carga</div>
                {[{n:"Atleta A",a:0.95,l:"Ideal",c:"#22C55E"},{n:"Atleta B",a:1.35,l:"Atenção",c:"#FBBF24"},{n:"Atleta C",a:1.65,l:"Risco",c:"#EF4444"}].map((x,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:i<2?"1px solid #1e3a5f15":"none"}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:x.c,boxShadow:`0 0 8px ${x.c}50`}}/><span style={{fontSize:12,color:"#ccd6e0",flex:1}}>{x.n}</span><span style={{fontSize:10,color:"#667788"}}>ACWR: {x.a}</span><span style={{fontSize:10,fontWeight:700,color:x.c,background:`${x.c}15`,padding:"2px 8px",borderRadius:10}}>{x.l}</span>
                  </div>
                ))}
