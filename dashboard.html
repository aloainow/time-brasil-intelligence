<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Time Brasil Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080f1a;-webkit-tap-highlight-color:transparent}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const PROXY = "https://judobase-proxy.vercel.app/api/judo";
const App = () => {
  const [sec, setSec] = useState("overview");
  const [loaded, setLoaded] = useState(false);
  const [mob, setMob] = useState(typeof window !== "undefined" && window.innerWidth < 768);
  const [selConf, setSelConf] = useState(null);
  const [cTab, setCTab] = useState("radar");
  const [judoData, setJudoData] = useState(null);
  const [judoComps, setJudoComps] = useState([]);
  const [selJudoka, setSelJudoka] = useState(null);
  const [jContests, setJContests] = useState([]);
  const [jRanking, setJRanking] = useState([]);
  const [jInfo, setJInfo] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    setTimeout(() => setLoaded(true), 100);
    const hR = () => setMob(window.innerWidth < 768);
    window.addEventListener("resize", hR);
    fetch(PROXY+"?action=country.info&id_country=49").then(r=>r.json()).then(setJudoData).catch(()=>{});
    fetch(PROXY+"?action=competition.get_list&year=2026").then(r=>r.json()).then(d=>setJudoComps(d.filter(c=>c.ages&&c.ages.includes("sen")&&c.rank_name!=="Other events"&&c.rank_name!=="Kata Tournament"))).catch(()=>{});
    return () => window.removeEventListener("resize", hR);
  }, []);

  const fetchJudoka = async (id,name) => {
    setLoading(true); setSelJudoka({id,name});
    try {
      const [c,r,i] = await Promise.all([
        fetch(PROXY+"?action=contest.find&id_person="+id).then(r=>r.json()),
        fetch(PROXY+"?action=competitor.wrl_current&id_person="+id).then(r=>r.json()),
        fetch(PROXY+"?action=competitor.info&id_person="+id).then(r=>r.json())
      ]);
      setJContests(c.contests||[]); setJRanking(r||[]); setJInfo(i);
    } catch(e){}
    setLoading(false);
  };

  const fn = "'Outfit','Segoe UI',sans-serif";
  const cd = {background:"linear-gradient(135deg,#0d1b2a,#152238)",borderRadius:16,padding:24,border:"1px solid #1e3a5f30"};
  const ic = {background:"#0a1628",borderRadius:12,padding:16,border:"1px solid #1e3a5f20"};
  const secs = [{id:"overview",l:"Visão Geral",i:"◉"},{id:"athletes",l:"Atletas 360",i:"⬡"},{id:"confederations",l:"Confederações",i:"◈"},{id:"competition",l:"Competição",i:"◇"},{id:"health",l:"Saúde & Carga",i:"♡"},{id:"strategy",l:"Estratégico",i:"◆"},{id:"public",l:"Portal Público",i:"◎"}];
  const Bar = ({v,c="#009C3B",w=120}) => <div style={{width:w,height:6,background:"#1a2332",borderRadius:3,overflow:"hidden"}}><div style={{width:`${Math.min(v,100)}%`,height:"100%",background:`linear-gradient(90deg,${c},${c}CC)`,borderRadius:3,transition:"width 1s ease"}}/></div>;
  const Ring = ({v,sz=48,c="#009C3B"}) => {const r=(sz-6)/2,ci=2*Math.PI*r,o=ci-(v/100)*ci;return <svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="#1a2332" strokeWidth={4}/><circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={c} strokeWidth={4} strokeDasharray={ci} strokeDashoffset={o} strokeLinecap="round" style={{transition:"stroke-dashoffset 1.2s ease"}}/><text x={sz/2} y={sz/2} textAnchor="middle" dominantBaseline="central" style={{transform:"rotate(90deg)",transformOrigin:"center",fontSize:sz*.28,fill:"#fff",fontWeight:700}}>{v}</text></svg>};

  const judokas = [
    {id:"7978",name:"SOUZA Beatriz",w:"+78",g:"F"},
    {id:"2618",name:"SILVA Rafael",w:"+100",g:"M"},
    {id:"2081",name:"ALTHEMAN Maria Suelen",w:"+78",g:"F"},
    {id:"8025",name:"LIMA Willian",w:"-66",g:"M"},
    {id:"4478",name:"BARBOSA Rafael",w:"-90",g:"M"},
    {id:"5476",name:"SANTOS Daniel",w:"-66",g:"M"},
  ];

  const confs = [
    {id:"cbj",nm:"CBJ",sp:"Judô",tp:"ind",cl:"#EF4444",live:true},
    {id:"cbb",nm:"CBB",sp:"Basquete",tp:"col",cl:"#F97316",live:false},
    {id:"cbv",nm:"CBV",sp:"Vôlei",tp:"col",cl:"#3B82F6",live:false},
    {id:"cbat",nm:"CBAt",sp:"Atletismo",tp:"ind",cl:"#FFB020",live:false},
    {id:"cbg",nm:"CBG",sp:"Ginástica",tp:"ind",cl:"#EC4899",live:false},
    {id:"cbda",nm:"CBDA",sp:"Natação",tp:"ind",cl:"#06B6D4",live:false},
    {id:"cbsurf",nm:"CBSurf",sp:"Surf",tp:"ind",cl:"#10B981",live:false},
    {id:"cbsk",nm:"CBSk",sp:"Skate",tp:"ind",cl:"#F43F5E",live:false},
    {id:"cbvela",nm:"CBVela",sp:"Vela",tp:"ind",cl:"#6366F1",live:false},
    {id:"cbc",nm:"CBC",sp:"Canoagem",tp:"ind",cl:"#F59E0B",live:false},
  ];

  const Empty = ({msg}) => <div style={{...cd,textAlign:"center",padding:40}}><div style={{fontSize:40,marginBottom:16}}>🔗</div><div style={{fontSize:14,color:"#556677"}}>{msg}</div></div>;

  const renderOverview = () => (
    <div style={{display:"flex",flexDirection:"column",gap:24}}>
      {judoData ? <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <span style={{fontSize:10,color:"#22C55E",background:"#22C55E15",padding:"3px 10px",borderRadius:20,fontWeight:700}}>📡 DADOS AO VIVO — IJF</span>
          <span style={{fontSize:10,color:"#556677"}}>Judô — primeira confederação integrada</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:14}}>
          {[{l:"Ranking Mundial Judô",v:"#"+(judoData.ranking?.place||"?"),s:judoData.ranking?.points+" pontos",a:"#009C3B"},
            {l:"Total Competidores",v:judoData.total_competitors?.toLocaleString(),s:judoData.male_competitiors+" M / "+judoData.female_competitiors+" F",a:"#3B82F6"},
            {l:"Lutas Registradas",v:judoData.number_of_total_fights?.toLocaleString(),s:judoData.number_of_total_wins?.toLocaleString()+" vitórias",a:"#FFDF00"},
            {l:"Win Rate",v:((judoData.number_of_total_wins/judoData.number_of_total_fights)*100).toFixed(1)+"%",s:"Todas as competições IJF",a:"#EC4899"}
          ].map((k,i)=>(
            <div key={i} style={{...cd,position:"relative",overflow:"hidden",opacity:loaded?1:0,transition:`all .6s ease ${i*.1}s`}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${k.a},transparent)`,borderRadius:"16px 16px 0 0"}}/>
              <div style={{fontSize:11,color:"#8899aa",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8}}>{k.l}</div>
              <div style={{fontSize:32,fontWeight:800,color:"#fff",fontFamily:fn}}>{k.v}</div>
              <div style={{fontSize:13,color:k.a,marginTop:6,fontWeight:500}}>{k.s}</div>
            </div>
          ))}
        </div>
      </div> : <div style={{textAlign:"center",padding:40,color:"#556677"}}>Carregando dados da IJF...</div>}

      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:14}}>
        {judoData && <div style={cd}>
          <h3 style={{color:"#fff",fontSize:15,fontWeight:700,margin:"0 0 16px",fontFamily:fn}}>Rankings por Gênero</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div style={{...ic,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:800,color:"#3B82F6",fontFamily:fn}}>#{judoData.ranking_male?.place}</div>
              <div style={{fontSize:11,color:"#8899aa"}}>Masculino</div>
              <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{judoData.ranking_male?.points} pts</div>
              <div style={{fontSize:10,color:"#3B82F6",marginTop:4}}>{judoData.best_male_competitor?.competitor_name}</div>
            </div>
            <div style={{...ic,textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:800,color:"#EC4899",fontFamily:fn}}>#{judoData.ranking_female?.place}</div>
              <div style={{fontSize:11,color:"#8899aa"}}>Feminino</div>
              <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{judoData.ranking_female?.points} pts</div>
              <div style={{fontSize:10,color:"#EC4899",marginTop:4}}>{judoData.best_female_competitor?.competitor_name}</div>
            </div>
          </div>
        </div>}
        <div style={cd}>
          <h3 style={{color:"#fff",fontSize:15,fontWeight:700,margin:"0 0 16px",fontFamily:fn}}>Confederações — Status de Integração</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
            {confs.map((c,i)=>(
              <div key={i} onClick={()=>{setSelConf(c);setSec("confederations");setCTab("radar");}} style={{...ic,textAlign:"center",cursor:"pointer",padding:10,borderColor:c.live?"#22C55E20":"#1e3a5f15",opacity:c.live?1:.5}}>
                <div style={{fontSize:11,color:c.cl,fontWeight:700}}>{c.nm}</div>
                <div style={{fontSize:8,color:c.live?"#22C55E":"#556677",marginTop:4}}>{c.live?"AO VIVO":"PENDENTE"}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  const renderAthletes = () => (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span style={{fontSize:10,color:"#22C55E",background:"#22C55E15",padding:"3px 10px",borderRadius:20,fontWeight:700}}>📡 JUDÔ AO VIVO</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(2,1fr)",gap:12}}>
        {judokas.map((j,i)=>(
          <div key={i} onClick={()=>fetchJudoka(j.id,j.name)} style={{...cd,cursor:"pointer",transition:"all .3s",borderColor:selJudoka?.id===j.id?"#009C3B40":"#1e3a5f30"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#009C3B40"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1e3a5f30"}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:48,height:48,borderRadius:12,background:"linear-gradient(135deg,#009C3B,#002776)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#FFDF00",flexShrink:0}}>{j.name.substring(0,2)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{j.name}</div>
                <div style={{fontSize:12,color:"#667788"}}>{j.w} | {j.g==="M"?"Masculino":"Feminino"}</div>
              </div>
              <span style={{fontSize:10,color:"#009C3B",fontWeight:600}}>Ver lutas →</span>
            </div>
            {selJudoka?.id===j.id && jInfo && <div style={{marginTop:16,borderTop:"1px solid #1e3a5f20",paddingTop:16}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
                {[{l:"Ranking",v:"#"+(jRanking[0]?.place||"—"),c:"#FFDF00"},{l:"Pontos",v:jRanking[0]?.points||"—",c:"#009C3B"},{l:"Lutas",v:jContests.length,c:"#3B82F6"},{l:"Vitórias",v:jContests.filter(c=>c.id_winner===j.id).length,c:"#22C55E"}].map((k,ki)=>(
                  <div key={ki} style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,color:k.c,fontFamily:fn}}>{k.v}</div><div style={{fontSize:9,color:"#667788"}}>{k.l}</div></div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:8,fontSize:11,color:"#8899aa"}}>
                <div>Técnica: <span style={{color:"#009C3B",fontWeight:600}}>{jInfo.ftechique||"—"}</span></div>
                <div>Lado: <span style={{color:"#fff"}}>{jInfo.side==="l"?"Canhoto":jInfo.side==="r"?"Destro":"—"}</span></div>
                <div>Treinador: <span style={{color:"#fff"}}>{jInfo.coach||"—"}</span></div>
                <div>Altura: <span style={{color:"#fff"}}>{jInfo.height?jInfo.height+"cm":"—"}</span></div>
              </div>
              {jContests.length>0&&<div style={{marginTop:12}}>
                <div style={{fontSize:11,color:"#8899aa",marginBottom:8,fontWeight:600}}>Últimas lutas</div>
                {[...jContests].sort((a,b)=>(b.competition_date||"").localeCompare(a.competition_date||"")).slice(0,8).map((c,ci)=>{
                  const isW=c.id_person_white===j.id;const won=c.id_winner===j.id;
                  const opp=isW?c.person_blue:c.person_white;const oppC=isW?c.country_short_blue:c.country_short_white;
                  return <div key={ci} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:ci<7?"1px solid #1e3a5f10":"none"}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:won?"#22C55E":"#EF4444",flexShrink:0}}/>
                    <div style={{flex:1,fontSize:10,color:"#ccd6e0"}}>vs {opp} ({oppC})</div>
                    <div style={{fontSize:9,color:"#556677"}}>{c.competition_name?.substring(0,25)}</div>
                    <span style={{fontSize:9,fontWeight:700,color:won?"#22C55E":"#EF4444"}}>{won?"V":"D"}</span>
                  </div>;
                })}
              </div>}
            </div>}
          </div>
        ))}
      </div>
      {loading&&<div style={{textAlign:"center",color:"#009C3B",fontSize:12}}>Carregando dados IJF...</div>}
    </div>
  );

  const renderConf = () => {
    const cf = selConf || confs[0];
    if (!cf.live) return <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {confs.map(c=><button key={c.id} onClick={()=>{setSelConf(c);setCTab("radar");}} style={{background:cf.id===c.id?c.cl:"#0d1b2a",border:`1px solid ${cf.id===c.id?c.cl:"#1e3a5f30"}`,borderRadius:10,padding:"8px 14px",color:cf.id===c.id?"#fff":"#8899aa",fontSize:12,fontWeight:600,cursor:"pointer"}}>{c.nm} <span style={{fontSize:9,opacity:.7}}>({c.sp})</span></button>)}
      </div>
      <Empty msg={`${cf.nm} (${cf.sp}) — Integração pendente. Os dados serão exibidos quando a API estiver conectada.`}/>
    </div>;
    // CBJ with live data
    return <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {confs.map(c=><button key={c.id} onClick={()=>{setSelConf(c);setCTab("radar");}} style={{background:cf.id===c.id?c.cl:"#0d1b2a",border:`1px solid ${cf.id===c.id?c.cl:"#1e3a5f30"}`,borderRadius:10,padding:"8px 14px",color:cf.id===c.id?"#fff":"#8899aa",fontSize:12,fontWeight:600,cursor:"pointer"}}>{c.nm} <span style={{fontSize:9,opacity:.7}}>({c.sp})</span>{c.live&&<span style={{fontSize:8,color:"#22C55E",marginLeft:4}}>●</span>}</button>)}
      </div>
      <div style={cd}>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
          <div style={{width:56,height:56,borderRadius:14,background:cf.cl+"25",border:`2px solid ${cf.cl}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:800,color:cf.cl}}>CBJ</div>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:fn}}>CBJ <span style={{color:"#667788",fontWeight:400}}>Analytics</span> <span style={{fontSize:10,color:"#22C55E",background:"#22C55E15",padding:"2px 8px",borderRadius:10}}>AO VIVO</span></div>
            <div style={{fontSize:13,color:"#8899aa"}}>Judô • {judoData?.total_competitors||"..."} competidores • Individual</div>
          </div>
        </div>
        {judoData&&<div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {[{l:"Ranking",v:"#"+judoData.ranking?.place,c:"#009C3B"},{l:"Masc",v:"#"+judoData.ranking_male?.place,c:"#3B82F6"},{l:"Fem",v:"#"+judoData.ranking_female?.place,c:"#EC4899"},{l:"Win Rate",v:((judoData.number_of_total_wins/judoData.number_of_total_fights)*100).toFixed(1)+"%",c:"#FFDF00"}].map((k,i)=>(
            <div key={i} style={{...ic,textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:k.c,fontFamily:fn}}>{k.v}</div><div style={{fontSize:9,color:"#667788"}}>{k.l}</div></div>
          ))}
        </div>}
        <div style={{fontSize:12,color:"#8899aa",marginBottom:10,fontWeight:600}}>Judocas — Clique para carregar perfil e lutas</div>
        <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3,1fr)",gap:10}}>
          {judokas.map((j,i)=>(
            <div key={i} onClick={()=>fetchJudoka(j.id,j.name)} style={{...ic,cursor:"pointer",transition:"all .3s",borderColor:selJudoka?.id===j.id?"#009C3B40":"#1e3a5f20"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor="#009C3B40"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1e3a5f20"}>
              <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{j.name}</div>
              <div style={{fontSize:11,color:"#667788"}}>{j.w} | {j.g==="M"?"Masc":"Fem"}</div>
              {selJudoka?.id===j.id&&jInfo&&<div style={{marginTop:8,fontSize:10,color:"#009C3B"}}>#{jRanking[0]?.place||"—"} | {jRanking[0]?.points||""} pts | {jInfo.ftechique||""}</div>}
            </div>
          ))}
        </div>
        {loading&&<div style={{textAlign:"center",marginTop:12,color:"#009C3B",fontSize:12}}>Carregando...</div>}
        {selJudoka&&jContests.length>0&&<div style={{marginTop:16}}>
          <div style={{fontSize:12,color:"#8899aa",marginBottom:10,fontWeight:600}}>Últimas lutas — {selJudoka.name} ({jContests.length} total, {jContests.filter(c=>c.id_winner===selJudoka.id).length} vitórias)</div>
          {[...jContests].sort((a,b)=>(b.competition_date||"").localeCompare(a.competition_date||"")).slice(0,12).map((c,i)=>{
            const isW=c.id_person_white===selJudoka.id;const won=c.id_winner===selJudoka.id;
            const opp=isW?c.person_blue:c.person_white;const oppC=isW?c.country_short_blue:c.country_short_white;
            return <div key={i} style={{...ic,marginBottom:4,display:"flex",alignItems:"center",gap:10,borderColor:won?"#22C55E15":"#EF444415"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:won?"#22C55E":"#EF4444",boxShadow:`0 0 8px ${won?"#22C55E":"#EF4444"}50`,flexShrink:0}}/>
              <div style={{flex:1}}><div style={{fontSize:11,fontWeight:600,color:"#fff"}}>vs {opp} <span style={{color:"#556677"}}>({oppC})</span></div><div style={{fontSize:9,color:"#667788"}}>{c.competition_name} | {c.round_name} | {c.competition_date}</div></div>
              <span style={{fontSize:10,fontWeight:700,color:won?"#22C55E":"#EF4444"}}>{won?"V":"D"}{c.gs==="1"?" GS":""}</span>
            </div>;
          })}
        </div>}
      </div>
    </div>;
  };

  const renderCompetition = () => (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span style={{fontSize:10,color:"#22C55E",background:"#22C55E15",padding:"3px 10px",borderRadius:20,fontWeight:700}}>📡 CALENDÁRIO AO VIVO — IJF</span>
      </div>
      {[{t:"Grand Slams",rn:"Grand Slam",c:"#FFDF00"},{t:"Grand Prix",rn:"Grand Prix",c:"#3B82F6"},{t:"Campeonatos Continentais",rn:"Championships",c:"#EC4899"},{t:"Opens",rn:"Open",c:"#009C3B"}].map((cat,ci)=>{
        const filtered = judoComps.filter(c=>c.rank_name?.includes(cat.rn));
        if(!filtered.length) return null;
        return <div key={ci} style={cd}>
          <h3 style={{color:cat.c,fontSize:15,fontWeight:700,margin:"0 0 16px",fontFamily:fn}}>{cat.t} 2026 ({filtered.length})</h3>
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(2,1fr)",gap:10}}>
            {filtered.map((c,i)=>(
              <div key={i} style={{...ic,borderColor:cat.c+"20"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{c.name}</div><div style={{fontSize:11,color:"#667788"}}>{c.city}, {c.country}</div></div>
                  {c.has_results&&c.has_results!=="0"&&<span style={{fontSize:8,padding:"2px 8px",borderRadius:20,background:"#22C55E15",color:"#22C55E",fontWeight:700}}>RESULTADOS</span>}
                </div>
                <div style={{fontSize:11,color:cat.c,marginTop:8,fontWeight:600}}>{c.date_from?.replace(/\//g,"-")}</div>
              </div>
            ))}
          </div>
        </div>;
      })}
    </div>
  );

  const renderPublic = () => (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{...cd,background:"linear-gradient(135deg,#0d1b2a,#002776)",textAlign:"center",padding:32}}>
